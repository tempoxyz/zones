name: Pull request audit

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read

jobs:
  audit:
    uses: tempoxyz/gh-actions/.github/workflows/pr-audit.yml@main
    with:
      required-label: cyclops
    secrets:
      EVENTS_KEY: ${{ secrets.EVENTS_KEY }}
      EVENTS_CERT: ${{ secrets.EVENTS_CERT }}
      EVENTS_ARGS: ${{ secrets.EVENTS_ARGS }}
