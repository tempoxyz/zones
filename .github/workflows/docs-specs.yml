name: Docs Specs

on:
  push:
    branches: [main, dr/validium]
    paths:
      - "docs/specs/src/**"
      - "docs/specs/test/**"
      - "docs/specs/foundry.toml"
      - "crates/tempo-zone/**"
      - ".github/workflows/docs-specs.yml"
  merge_group:
  pull_request:
    branches: [main, dr/validium]
    paths:
      - "docs/specs/src/**"
      - "docs/specs/test/**"
      - "docs/specs/foundry.toml"
      - "crates/tempo-zone/**"
      - ".github/workflows/docs-specs.yml"

env:
  FOUNDRY_PROFILE: ci
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: "sccache"

jobs:
  build:
    name: Forge Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1.7.0

      - name: Show Forge version
        run: forge --version

      - name: Run Forge build
        working-directory: docs/specs
        run: forge build --sizes

  lint:
    name: Forge Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1.7.0

      - name: Run Forge fmt check (zone-only)
        working-directory: docs/specs
        run: forge fmt --check src/zone test/zone

  test:
    name: Forge Test (Solidity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1.7.0

      - name: Run Forge tests (zone-only)
        working-directory: docs/specs
        run: forge test -vvv --match-path "test/zone/**"

  tempo-foundry-test:
    name: Forge Test (Rust Precompiles)
    if: false
    runs-on: depot-ubuntu-latest-8
    timeout-minutes: 60
    steps:
      - name: Checkout tempo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          path: tempo

      - name: Checkout tempo-foundry
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: tempoxyz/tempo-foundry
          path: tempo-foundry

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: tempo-foundry

      - name: Update tempo-foundry to use current commit
        if: github.repository == 'tempoxyz/tempo'
        working-directory: tempo-foundry
        run: |
          COMMIT_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          REPO_URL="https://github.com/tempoxyz/tempo"
          echo "Updating tempo dependencies to commit: $COMMIT_SHA"
          echo "Using git source repository: $REPO_URL"

          # Update all tempo dependencies to point to the current commit
          # Using # as delimiter since URLs contain /
          sed -i -E \
            "s#(tempo-[a-z-]+) = \{ git = \"https://github.com/[^\"]+\", rev = \"[^\"]+\" \}#\1 = { git = \"$REPO_URL\", rev = \"$COMMIT_SHA\" }#g" \
            Cargo.toml

          echo "Updated Cargo.toml:"
          grep "tempo-" Cargo.toml | head -20

          # Update Cargo.lock to resolve version conflicts
          cargo update

      - name: Build tempo-foundry forge
        working-directory: tempo-foundry
        run: cargo build -p forge --profile release

      - name: Run Forge tests with Rust precompiles (zone-only)
        working-directory: tempo/docs/specs
        run: |
          echo "Running forge test with tempo-foundry (isTempo=true)"
          ../../../tempo-foundry/target/release/forge test -vvv --match-path "test/zone/**"

  docs-specs-success:
    name: docs-specs success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build
      - lint
      - test
    timeout-minutes: 5
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
