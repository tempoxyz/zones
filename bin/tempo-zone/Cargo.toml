[package]
name = "tempo-zone"
description = "Tempo Zone L2 node binary"
default-run = "tempo-zone"

version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
# tempo
zone = { path = "../../crates/tempo-zone" }
tempo-chainspec = { workspace = true, features = ["cli"] }
tempo-evm.workspace = true

# reth
reth-cli-util.workspace = true
reth-consensus.workspace = true
reth-ethereum = { workspace = true, features = ["cli"] }
reth-node-builder.workspace = true
reth-tracing.workspace = true

# misc
clap.workspace = true

[[bin]]
name = "tempo-zone"
path = "src/main.rs"

[features]
default = ["jemalloc"]

jemalloc = ["reth-cli-util/jemalloc", "reth-ethereum/jemalloc"]
