[package]
name = "tempo-zone"
description = "Tempo Zone L2 node binary"
default-run = "tempo-zone"

version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
# tempo
zone = { path = "../../crates/tempo-zone", features = ["cli"] }

# reth
reth-cli-util.workspace = true

# tls
rustls = { version = "0.23", features = ["aws-lc-rs"] }

[[bin]]
name = "tempo-zone"
path = "src/main.rs"

[features]
default = ["jemalloc"]

jemalloc = ["reth-cli-util/jemalloc", "zone/jemalloc"]
