[package]
name = "tempo-zone"
description = "Tempo Zone L2 node"
default-run = "tempo-zone"

version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
# tempo-zone-exex
tempo-zone-exex.workspace = true

# tempo
tempo-chainspec = { workspace = true, features = ["default"] }
tempo-consensus.workspace = true
tempo-evm.workspace = true
tempo-node = { workspace = true, features = ["default"] }

# reth
reth-chainspec.workspace = true
reth-cli-util.workspace = true
reth-ethereum = { workspace = true, features = ["cli"] }
reth-node-builder.workspace = true

# misc
clap.workspace = true
eyre.workspace = true
tracing.workspace = true

[[bin]]
name = "tempo-zone"
path = "src/main.rs"

[features]
default = ["asm-keccak", "jemalloc"]

asm-keccak = [
	"tempo-node/asm-keccak"
]

jemalloc = [
	"reth-cli-util/jemalloc",
	"tempo-node/jemalloc"
]
