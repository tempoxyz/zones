[package]
name = "aws-nitro-prover"
description = "AWS Nitro enclave prover echo service"
default-run = "aws-nitro-prover"

version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
axum.workspace = true
clap = { workspace = true, features = ["env"] }
const-hex = { version = "1.18.1", default-features = false, features = ["alloc"] }
eyre.workspace = true
serde = { workspace = true, features = ["derive", "alloc"] }
tokio.workspace = true
tokio-vsock = { version = "0.7.2", features = ["axum08"] }

[target.'cfg(target_os = "linux")'.dependencies]
aws-nitro-enclaves-nsm-api = { version = "0.5", default-features = false, features = ["nix"] }
serde_bytes = "0.11"

[dev-dependencies]
serde_json.workspace = true

[[bin]]
name = "aws-nitro-prover"
path = "src/main.rs"

[[bin]]
name = "aws-nitro-prover-vsock-bridge"
path = "src/bin/vsock_bridge.rs"
